<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>scorebench</title>
    <style>
      /* First-paint shell: keep the window dark before the app bundle executes. */
      html,
      body {
        margin: 0;
        height: 100%;
        background: #020706;
        overflow: hidden;
      }
      #boot {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: radial-gradient(ellipse at 47% -14%, rgba(16, 64, 56, 0.35), transparent 42%), #020706;
        transition: opacity 0.28s ease;
        pointer-events: none;
      }
      #boot.done {
        opacity: 0;
      }
      #boot .pulse {
        display: flex;
        align-items: center;
        gap: 4px;
        height: 34px;
      }
      #boot .pulse i {
        width: 3px;
        border-radius: 4px;
        background: hsl(171 78% 59%);
        box-shadow: 0 0 12px hsl(171 88% 58% / 0.5);
        animation: boot-eq 0.9s ease-in-out infinite alternate;
      }
      #boot .pulse i:nth-child(1) { height: 10px; animation-delay: 0s; }
      #boot .pulse i:nth-child(2) { height: 22px; animation-delay: 0.12s; }
      #boot .pulse i:nth-child(3) { height: 32px; animation-delay: 0.24s; }
      #boot .pulse i:nth-child(4) { height: 20px; animation-delay: 0.36s; }
      #boot .pulse i:nth-child(5) { height: 12px; animation-delay: 0.48s; }
      @keyframes boot-eq {
        from { transform: scaleY(0.45); opacity: 0.55; }
        to { transform: scaleY(1); opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot .pulse i { animation: none; }
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div id="boot" aria-hidden="true"><span class="pulse"><i></i><i></i><i></i><i></i><i></i></span></div>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
