<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>航线 · Voyage — showcase</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        color: #cfe0f5;
      }
      #stage {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
      .hud {
        position: fixed;
        pointer-events: none;
        text-shadow: 0 1px 8px rgba(0, 0, 0, 0.9);
      }
      #act {
        top: 28px;
        left: 32px;
      }
      #act-index {
        font-size: 11px;
        letter-spacing: 0.3em;
        opacity: 0.55;
      }
      #act-name {
        font-size: 28px;
        font-weight: 600;
        margin: 6px 0 4px;
      }
      #act-note {
        font-size: 13px;
        opacity: 0.75;
      }
      #hue-label {
        top: 30px;
        right: 32px;
        font-size: 12px;
        opacity: 0.6;
      }
      #helm {
        left: 32px;
        bottom: 30px;
        width: 230px;
      }
      #helm-speed {
        font-size: 34px;
        font-weight: 600;
        letter-spacing: 0.04em;
      }
      #helm-speed small {
        font-size: 12px;
        font-weight: 400;
        opacity: 0.55;
        letter-spacing: 0.2em;
      }
      #helm-weather {
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        opacity: 0.6;
        margin-top: 4px;
      }
      #signals {
        right: 32px;
        bottom: 54px;
        width: 200px;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 5px;
      }
      .label {
        width: 68px;
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        opacity: 0.7;
      }
      .bar {
        flex: 1;
        height: 4px;
        border-radius: 2px;
        background: rgba(160, 190, 230, 0.14);
        overflow: hidden;
      }
      .fill {
        display: block;
        height: 100%;
        width: 0;
        border-radius: 2px;
        background: linear-gradient(90deg, rgba(120, 185, 240, 0.55), rgba(190, 225, 255, 0.95));
      }
      #keys {
        right: 32px;
        bottom: 26px;
        font-size: 10px;
        letter-spacing: 0.08em;
        opacity: 0.45;
      }
      #paused {
        display: none;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 40px;
        letter-spacing: 0.5em;
        opacity: 0.7;
      }
      body.capture-clean .hud {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div id="act" class="hud">
      <div id="act-index">LEG 1/6</div>
      <div id="act-name">静航 · Silent Running</div>
      <div id="act-note"></div>
    </div>
    <div id="hue-label" class="hud">hue 210°</div>
    <div id="helm" class="hud">
      <div id="helm-speed">0.30 <small>CRUISE</small></div>
      <div id="helm-weather">clear</div>
      <div id="helm-bars"></div>
    </div>
    <div id="signals" class="hud"></div>
    <div id="keys" class="hud">1-6 航段 · SPACE 暂停 · T 主题色 · I 意图先验 · R 重来</div>
    <div id="paused" class="hud">PAUSED</div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
