name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            bundles: app,dmg
          - os: macos-14
            target: x86_64-apple-darwin
            bundles: app,dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi,nsis
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
    runs-on: ${{ matrix.os }}
    env:
      TARGET: ${{ matrix.target }}
      HAS_APPLE_RELEASE: ${{ secrets.APPLE_CERTIFICATE != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.APPLE_SIGNING_IDENTITY != '' && secrets.APPLE_ID != '' && secrets.APPLE_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: npm ci

      - name: Verify tag matches the application version
        run: node scripts/check-tag-version.mjs

      - name: Build unsigned or non-macOS bundles
        if: runner.os != 'macOS' || env.HAS_APPLE_RELEASE != 'true'
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Build signed and notarized macOS bundles
        if: runner.os == 'macOS' && env.HAS_APPLE_RELEASE == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Verify notarization staple
        if: runner.os == 'macOS' && env.HAS_APPLE_RELEASE == 'true'
        shell: bash
        run: xcrun stapler validate "src-tauri/target/${TARGET}/release/bundle/macos/scorebench.app"

      - name: Collect macOS assets
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p release-assets
          cp "src-tauri/target/${TARGET}/release/bundle/dmg/"*.dmg release-assets/
          tar -czf "release-assets/scorebench-${TARGET}.app.tar.gz" \
            -C "src-tauri/target/${TARGET}/release/bundle/macos" scorebench.app

      - name: Collect Linux assets
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p release-assets
          find "src-tauri/target/${TARGET}/release/bundle" -type f \
            \( -name '*.AppImage' -o -name '*.deb' \) -exec cp {} release-assets/ \;

      - name: Collect Windows assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Get-ChildItem "src-tauri/target/$env:TARGET/release/bundle" -Recurse -File |
            Where-Object { $_.Extension -in '.msi', '.exe' } |
            Copy-Item -Destination release-assets

      - uses: actions/upload-artifact@v5
        with:
          name: release-${{ matrix.target }}
          path: release-assets/*
          if-no-files-found: error

  draft-release:
    name: Assemble draft release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-assets
          find . -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum | sed 's# \./#  #' > ../SHA256SUMS
          mv ../SHA256SUMS .

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          body_path: .github/release-notes.md
          files: release-assets/*
